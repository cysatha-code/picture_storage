<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1010" viewBox="0 0 1000 1010" font-family="'Segoe UI',Arial,sans-serif">
  <rect x="0" y="0" width="1000" height="1010" fill="#ffffff"/>

  <!-- ===================== TITLE ===================== -->
  <text x="500" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">WB 上样与迁移示意图 · shKRAS 跨细胞系 overview</text>
  <text x="500" y="58" text-anchor="middle" font-size="14" fill="#6b7280">一块 12.5% 胶跑 3 细胞系（shNC vs shKRAS）｜ 转膜后按 MW 切 3 条：KRAS / β-actin / AKT</text>

  <!-- ===================== LOADING MAP (top view) ===================== -->
  <text x="40" y="96" font-size="17" font-weight="700" fill="#111827">① 上样排序（一块 12.5% 胶 = 3 个细胞系，Marker 作分隔）</text>

  <!-- group brackets -->
  <text x="295" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">BxPC-3</text>
  <text x="565" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">MIA PaCa-2</text>
  <text x="835" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">PANC-1</text>

  <!-- lanes: M | shNC shKRAS | M | shNC shKRAS | M | shNC shKRAS | M -->
  <rect x="74"  y="132" width="82" height="115" rx="6" fill="#9ca3af"/>
  <rect x="164" y="132" width="82" height="115" rx="6" fill="#5eead4"/>
  <rect x="254" y="132" width="82" height="115" rx="6" fill="#fcd34d"/>
  <rect x="344" y="132" width="82" height="115" rx="6" fill="#9ca3af"/>
  <rect x="434" y="132" width="82" height="115" rx="6" fill="#5eead4"/>
  <rect x="524" y="132" width="82" height="115" rx="6" fill="#fcd34d"/>
  <rect x="614" y="132" width="82" height="115" rx="6" fill="#9ca3af"/>
  <rect x="704" y="132" width="82" height="115" rx="6" fill="#5eead4"/>
  <rect x="794" y="132" width="82" height="115" rx="6" fill="#fcd34d"/>
  <rect x="884" y="132" width="82" height="115" rx="6" fill="#9ca3af"/>

  <g font-size="12.5" fill="#1f2937" text-anchor="middle" font-weight="600">
    <text x="115" y="196">M</text>
    <text x="205" y="188">shNC</text><text x="205" y="204">BxPC</text>
    <text x="295" y="188">shKRAS</text><text x="295" y="204">BxPC</text>
    <text x="385" y="196">M</text>
    <text x="475" y="188">shNC</text><text x="475" y="204">MIA</text>
    <text x="565" y="188">shKRAS</text><text x="565" y="204">MIA</text>
    <text x="655" y="196">M</text>
    <text x="745" y="188">shNC</text><text x="745" y="204">PANC</text>
    <text x="835" y="188">shKRAS</text><text x="835" y="204">PANC</text>
    <text x="925" y="196">M</text>
  </g>
  <g font-size="12" fill="#374151" text-anchor="middle">
    <text x="115" y="265">1</text><text x="205" y="265">2</text><text x="295" y="265">3</text>
    <text x="385" y="265">4</text><text x="475" y="265">5</text><text x="565" y="265">6</text>
    <text x="655" y="265">7</text><text x="745" y="265">8</text><text x="835" y="265">9</text><text x="925" y="265">10</text>
  </g>

  <!-- ===================== MIGRATION CHART (single 12.5% gel) ===================== -->
  <text x="40" y="320" font-size="17" font-weight="700" fill="#111827">② 12.5% 胶迁移位置 + 切膜方案（蓝=Marker，红=目标，绿=内参）</text>

  <!-- axis: mig_y(p) = 360 + p*6 -->
  <g font-size="11" fill="#6b7280" text-anchor="end">
    <text x="330" y="364">0%</text>
    <text x="330" y="484">20%</text>
    <text x="330" y="604">40%</text>
    <text x="330" y="724">60%</text>
    <text x="330" y="844">80%</text>
    <text x="330" y="964">100%</text>
  </g>
  <line x1="340" y1="360" x2="340" y2="960" stroke="#d1d5db" stroke-width="1"/>

  <!-- strip shading -->
  <rect x="400" y="360" width="200" height="222" fill="#eff6ff"/>
  <rect x="400" y="582" width="200" height="126" fill="#f0fdf4"/>
  <rect x="400" y="708" width="200" height="252" fill="#fef2f2"/>
  <rect x="400" y="360" width="200" height="600" rx="6" fill="none" stroke="#cbd5e1"/>

  <!-- cut lines -->
  <line x1="360" y1="582" x2="700" y2="582" stroke="#374151" stroke-width="2" stroke-dasharray="8 5"/>
  <line x1="360" y1="708" x2="700" y2="708" stroke="#374151" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="366" y="577" font-size="11" fill="#374151">✂ 切 ~50 kDa</text>
  <text x="366" y="703" font-size="11" fill="#374151">✂ 切 ~30 kDa</text>

  <!-- marker bands 12%: 270@5 175@12 130@15 95@20 66@27 52@33 37@48 30@58 16@87 -->
  <g stroke="#3b82f6" stroke-width="4">
    <line x1="410" y1="390" x2="500" y2="390"/>
    <line x1="410" y1="432" x2="500" y2="432"/>
    <line x1="410" y1="450" x2="500" y2="450"/>
    <line x1="410" y1="480" x2="500" y2="480"/>
    <line x1="410" y1="522" x2="500" y2="522"/>
    <line x1="410" y1="558" x2="500" y2="558"/>
    <line x1="410" y1="648" x2="500" y2="648"/>
    <line x1="410" y1="708" x2="500" y2="708"/>
    <line x1="410" y1="882" x2="500" y2="882"/>
  </g>
  <g font-size="10" fill="#3b82f6" text-anchor="start">
    <text x="503" y="394">270</text><text x="503" y="436">175</text><text x="503" y="454">130</text>
    <text x="503" y="484">95</text><text x="503" y="526">66</text><text x="503" y="562">52</text>
    <text x="503" y="652">37</text><text x="503" y="712">30</text><text x="503" y="886">16</text>
  </g>

  <!-- target/control bands -->
  <line x1="520" y1="540" x2="600" y2="540" stroke="#dc2626" stroke-width="7"/>
  <line x1="520" y1="624" x2="600" y2="624" stroke="#16a34a" stroke-width="7"/>
  <line x1="520" y1="792" x2="600" y2="792" stroke="#dc2626" stroke-width="7"/>

  <!-- strip labels / antibody -->
  <g font-size="13" text-anchor="start">
    <text x="640" y="466" font-weight="700" fill="#2563eb">条带 A（膜上段）</text>
    <text x="640" y="486" fill="#374151">→ 打 anti-AKT</text>
    <text x="640" y="540" font-size="14" font-weight="700" fill="#dc2626">AKT ~60 kDa</text>

    <text x="640" y="626" font-weight="700" fill="#0d9488">条带 B（膜中段）</text>
    <text x="640" y="646" fill="#374151">→ 打 anti-β-actin（内参）</text>
    <text x="640" y="678" font-size="14" font-weight="700" fill="#16a34a">β-actin ~42 kDa</text>

    <text x="640" y="760" font-weight="700" fill="#b45309">条带 C（膜下段）</text>
    <text x="640" y="780" fill="#374151">→ 打 anti-KRAS ★先验敲降</text>
    <text x="640" y="812" font-size="14" font-weight="700" fill="#dc2626">KRAS ~21 kDa</text>
  </g>

  <!-- LEGEND -->
  <text x="40" y="998" font-size="12" fill="#6b7280">图例：</text>
  <line x1="90" y1="994" x2="120" y2="994" stroke="#3b82f6" stroke-width="4"/>
  <text x="126" y="998" font-size="12" fill="#374151">Marker</text>
  <line x1="200" y1="994" x2="230" y2="994" stroke="#dc2626" stroke-width="6"/>
  <text x="236" y="998" font-size="12" fill="#374151">目标蛋白</text>
  <line x1="320" y1="994" x2="350" y2="994" stroke="#16a34a" stroke-width="6"/>
  <text x="356" y="998" font-size="12" fill="#374151">内参</text>
  <text x="430" y="998" font-size="12" fill="#9ca3af">✂ 转膜后横切；每泳道对自己的 β-actin 归一化，组内比 shKRAS vs shNC</text>
</svg>
